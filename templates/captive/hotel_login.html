<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest WiFi Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: 12px; padding: 36px; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .brand { text-align: center; margin-bottom: 24px; }
        .brand-icon { font-size: 40px; margin-bottom: 8px; }
        .brand-name { font-size: 20px; font-weight: 700; color: #1a1a2e; letter-spacing: 2px; }
        .brand-sub { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 3px; margin-top: 4px; }
        h2 { text-align: center; color: #333; font-size: 16px; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #777; font-size: 13px; margin-bottom: 24px; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { border-color: #0f3460; outline: none; }
        .row { display: flex; gap: 12px; }
        .row .form-group { flex: 1; }
        button { width: 100%; padding: 13px; background: #0f3460; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        button:hover { background: #1a1a2e; }
        .terms { text-align: center; margin-top: 16px; font-size: 11px; color: #aaa; line-height: 1.4; }
        .wifi-info { background: #f8f9fa; border-radius: 6px; padding: 10px 14px; margin-bottom: 20px; font-size: 12px; color: #555; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-icon">&#127976;</div>
            <div class="brand-name">GUEST WiFi</div>
            <div class="brand-sub">Complimentary Internet Access</div>
        </div>
        <div class="wifi-info">High-speed WiFi is available for all guests. Please sign in below to connect.</div>
        <h2>Guest Login</h2>
        <p class="subtitle">Enter your details to access the internet</p>
        <form method="POST" action="/login">
            <div class="row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="username" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label>Room / Table #</label>
                    <input type="text" name="room" placeholder="101">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="guest@example.com">
            </div>
            <div class="form-group">
                <label>Access Code</label>
                <input type="password" name="password" placeholder="Provided at check-in" required>
            </div>
            <button type="submit">Connect to WiFi</button>
        </form>
        <div class="terms">By connecting you agree to our Acceptable Use Policy.<br>24/7 support: ext. 0</div>
    </div>
</body>
</html>
