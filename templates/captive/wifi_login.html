<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: 16px; padding: 40px; max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .icon { text-align: center; margin-bottom: 20px; font-size: 48px; }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 22px; }
        p { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
        input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: border-color 0.2s; }
        input:focus { border-color: #667eea; outline: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .terms { text-align: center; margin-top: 16px; font-size: 11px; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#128246;</div>
        <h1>Connect to WiFi</h1>
        <p>Please sign in to access the internet</p>
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Email Address</label>
                <input type="text" name="username" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit">Connect</button>
        </form>
        <div class="terms">By connecting, you agree to the Terms of Service and Privacy Policy.</div>
    </div>
</body>
</html>
